[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
    "vault-v2/=lib/vault-v2/src/",
    "forge-std/=lib/forge-std/src/",
]
# Fork tests hit the public HyperEVM RPC; excluded from plain `forge test`.
# Run them with: FOUNDRY_PROFILE=fork forge test
no_match_path = "test/fork/*"

[profile.fork]
test = "test/fork"
no_match_path = "this-matches-nothing"
# VaultV2 uses transient storage (firstTotalAssets): interest accrues once per TRANSACTION.
# isolate runs each top-level test call as its own tx, matching live-chain behavior.
isolate = true
# The forked HyperEVM block env carries the 3M "small block" gas limit — too small to deploy
# VaultV2Factory (on the real chain this deployment requires opting into 30M "big blocks").
disable_block_gas_limit = true
